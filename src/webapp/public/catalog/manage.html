<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catalog Manager — Powered by VFPE</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00d26a; --bg: #0a0a0a; --card: #141414; --border: #1e1e1e; --text: #f0f0f0; --muted: #666; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 80px; }

        .header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header h1 { font-size: 1.1rem; font-weight: 700; }
        .header-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        .plan-badge {
            font-size: 0.6rem; font-weight: 900; padding: 2px 8px; border-radius: 4px;
            background: #333; color: #fff; margin-left: 8px; vertical-align: middle;
        }
        .plan-pro { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 16px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: 900; color: var(--accent); display: block; }
        .stat-lbl { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        /* Navigation */
        .nav-bar {
            display: flex; gap: 8px; padding: 0 16px 16px;
            overflow-x: auto; scrollbar-width: none;
        }
        .nav-btn {
            flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
            color: var(--muted); padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: 'Outfit', sans-serif; transition: 0.2s;
        }
        .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

        /* Tab Content */
        .tab-content { display: none; padding: 0 16px; }
        .tab-content.active { display: block; }

        /* Product List */
        .product-row {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px; margin-bottom: 12px;
            display: flex; align-items: center; gap: 12px;
        }
        .product-thumb {
            width: 48px; height: 48px; border-radius: 10px; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0;
            overflow: hidden;
        }
        .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { flex: 1; min-width: 0; }
        .product-name { font-size: 0.9rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
        .product-actions { display: flex; gap: 8px; align-items: center; }

        .btn-icon {
            width: 32px; height: 32px; background: #1a1a1a; border: 1px solid var(--border);
            border-radius: 8px; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .btn-icon.active { color: #FFD700; border-color: #FFD700; }

        .toggle-btn {
            background: none; border: 1px solid var(--border); border-radius: 20px;
            padding: 4px 10px; font-size: 0.7rem; font-weight: 700; cursor: pointer; font-family: 'Outfit';
        }
        .toggle-btn.available { border-color: var(--accent); color: var(--accent); }
        .toggle-btn.unavailable { border-color: #ff4d4d; color: #ff4d4d; }

        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            color: #fff; padding: 12px; border-radius: 12px; font-family: 'Outfit'; font-size: 0.9rem; outline: none;
        }
        .form-group input:focus { border-color: var(--accent); }
        
        .btn-submit {
            width: 100%; background: var(--accent); color: #000; border: none;
            border-radius: 14px; padding: 16px; font-size: 1rem; font-weight: 900;
            cursor: pointer; font-family: 'Outfit'; transition: 0.2s;
        }

        /* Color Picker */
        .color-grid { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .color-swatch { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
        .color-swatch.selected { border-color: #fff; transform: scale(1.1); }

        .upgrade-box {
            background: linear-gradient(45deg, #FFD700, #FFA500); color: #000;
            padding: 20px; border-radius: 16px; text-align: center; margin-top: 20px;
        }
        
        .empty-state { text-align: center; padding: 40px; color: var(--muted); }
    </style>
</head>
<body>

    <header class="header">
        <div>
            <h1>
                <span id="header-name">Catalog Manager</span>
                <span id="plan-badge" class="plan-badge">BASIC</span>
            </h1>
            <div class="header-sub" id="header-sub">Loading...</div>
        </div>
        <div id="demo-badge" class="plan-badge" style="background:#FFD700; color:#000; display:none;">DEMO</div>
    </header>

    <div class="stats-grid">
        <div class="stat-card"><span class="stat-val" id="stat-products">0</span><span class="stat-lbl">Items</span></div>
        <div class="stat-card"><span class="stat-val" id="stat-available">0</span><span class="stat-lbl">Live</span></div>
        <div class="stat-card"><span class="stat-val" id="stat-views">0</span><span class="stat-lbl">Views</span></div>
    </div>

    <nav class="nav-bar">
        <button class="nav-btn active" id="btn-products" onclick="switchTab('products')">📦 Products</button>
        <button class="nav-btn" id="btn-add" onclick="switchTab('add')">➕ Add</button>
        <button class="nav-btn" id="btn-store" onclick="switchTab('store')">🏪 My Store</button>
    </nav>

    <!-- Tab: Products -->
    <div id="tab-products" class="tab-content active">
        <div id="product-list"></div>
    </div>

    <!-- Tab: Add/Edit Product -->
    <div id="tab-add" class="tab-content">
        <h2 id="form-title" style="margin-bottom:20px; font-weight:900;">New Product</h2>
        <input type="hidden" id="edit-id">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="p-name" placeholder="e.g. OG Kush">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
            <div class="form-group">
                <label>Category</label>
                <select id="p-cat">
                    <option value="flower">🌿 Flower</option>
                    <option value="extract">🧪 Extract</option>
                    <option value="edible">🍫 Edible</option>
                    <option value="accessory">🛒 Accessory</option>
                    <option value="other">✨ Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Unit</label>
                <input type="text" id="p-unit" placeholder="g, unit, ml...">
            </div>
        </div>
        <div class="form-group">
            <label>Price (#)</label>
            <input type="number" id="p-price" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Description (Optional)</label>
            <textarea id="p-desc" placeholder="Tell customers about the product..."></textarea>
        </div>
        <div class="form-group">
            <label>Photo URL (Optional)</label>
            <input type="text" id="p-photo" placeholder="https://...">
        </div>
        <button class="btn-submit" id="btn-save-product" onclick="saveProduct()">Add Product</button>
        <button class="btn-submit" id="btn-cancel-edit" style="background:#333; margin-top:10px; display:none;" onclick="cancelEdit()">Cancel Edit</button>
    </div>

    <!-- Tab: My Store -->
    <div id="tab-store" class="tab-content">
        <h2 style="margin-bottom:20px; font-weight:900;">Store Settings</h2>
        
        <div class="form-group">
            <label>Store Name</label>
            <input type="text" id="s-name" placeholder="Your brand name">
        </div>
        <div class="form-group">
            <label>Logo / Profile Photo URL</label>
            <input type="text" id="s-logo" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Biography / Info</label>
            <textarea id="s-bio" rows="2" placeholder="Describe your store..."></textarea>
        </div>
        <div class="form-group">
            <label>💰 Minimum Order (#)</label>
            <input type="number" id="s-min-order" placeholder="0.00">
        </div>
        
        <div class="form-group">
            <label>🎨 Theme Color</label>
            <div class="color-grid">
                <div class="color-swatch" style="background:#00d26a;" data-color="#00d26a" onclick="selectColor(this)"></div>
                <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6" onclick="selectColor(this)"></div>
                <div class="color-swatch" style="background:#3498db;" data-color="#3498db" onclick="selectColor(this)"></div>
                <div class="color-swatch" style="background:#FFD700;" data-color="#FFD700" onclick="selectColor(this)"></div>
                <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c" onclick="selectColor(this)"></div>
            </div>
        </div>

        <button class="btn-submit" onclick="saveStoreSettings()">Save All Settings</button>

        <div id="pro-box" class="upgrade-box" style="display:none;">
            <h3 style="font-weight:900;">🚀 GO PRO</h3>
            <p style="font-size:0.8rem; margin:8px 0;">Unlimited products, featured items, and custom colors.</p>
            <button style="background:#000; color:#fff; border:none; padding:8px 16px; border-radius:20px; font-weight:700; cursor:pointer;" onclick="alert('Contact @VFPE_Admin for PRO activation!')">Activate PRO</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.expand(); tg.ready(); }

        const CAT_EMOJI = { flower: '🌿', extract: '🧪', edible: '🍫', accessory: '🛒', other: '✨' };
        
        const params = new URLSearchParams(window.location.search);
        const isDemo = params.get('demo') === 'true';
        const slug = params.get('slug') || 'hashandcrafts';

        let store = null;
        let products = [];

        async function init() {
            if (isDemo) {
                document.getElementById('demo-badge').style.display = 'inline-block';
                store = { id: 1, slug: 'demo', name: 'Demo Store', logo_url: '', bio: 'Demo account.', theme_color: '#00d26a', min_order_amount: 50, is_pro: false };
                products = [
                    { id: 1, name: 'Sample Product', category: 'flower', price: 10, unit: 'g', available: true, featured: false }
                ];
            } else {
                try {
                    const res = await fetch(`/catalog/api/${slug}`);
                    const data = await res.json();
                    store = data.store;
                    products = data.products;
                } catch (e) {
                    alert('Error loading catalog.');
                    return;
                }
            }

            renderHeader();
            renderStats();
            renderProducts();
            renderStoreTab();
            applyTheme(store.theme_color);
        }

        function renderHeader() {
            document.getElementById('header-name').textContent = store.name;
            document.getElementById('header-sub').textContent = `@${store.slug}`;
            const badge = document.getElementById('plan-badge');
            badge.textContent = store.is_pro ? 'PRO' : 'BASIC';
            badge.className = `plan-badge ${store.is_pro ? 'plan-pro' : ''}`;
            document.getElementById('pro-box').style.display = store.is_pro ? 'none' : 'block';
        }

        function renderStats() {
            document.getElementById('stat-products').textContent = products.length;
            document.getElementById('stat-available').textContent = products.filter(p => p.available).length;
            document.getElementById('stat-views').textContent = isDemo ? '1.2k' : '—';
        }

        function renderProducts() {
            const list = document.getElementById('product-list');
            if (!products.length) {
                list.innerHTML = '<div class="empty-state">No products yet. Click "Add" to start.</div>';
                return;
            }
            list.innerHTML = products.map(p => `
                <div class="product-row">
                    <div class="product-thumb">
                        ${p.photo_url ? `<img src="${p.photo_url}">` : CAT_EMOJI[p.category]}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-meta">${CAT_EMOJI[p.category]} • ${p.price}# / ${p.unit}</div>
                    </div>
                    <div class="product-actions">
                        <button class="btn-icon" onclick="editProduct(${p.id})">✏️</button>
                        <button class="btn-icon ${p.featured ? 'active' : ''}" onclick="toggleFeatured(${p.id})">★</button>
                        <button class="toggle-btn ${p.available ? 'available' : 'unavailable'}" onclick="toggleAvailable(${p.id})">
                            ${p.available ? 'Live' : 'Off'}
                        </button>
                        <button class="btn-icon" style="color:#ff4d4d" onclick="deleteProduct(${p.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        function renderStoreTab() {
            document.getElementById('s-name').value = store.name;
            document.getElementById('s-logo').value = store.logo_url || '';
            document.getElementById('s-bio').value = store.bio || '';
            document.getElementById('s-min-order').value = store.min_order_amount || 0;
            
            // Select current color
            document.querySelectorAll('.color-swatch').forEach(s => {
                if (s.dataset.color === store.theme_color) s.classList.add('selected');
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`btn-${tab}`).classList.add('active');
        }

        function saveProduct() {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('p-name').value.trim(),
                category: document.getElementById('p-cat').value,
                unit: document.getElementById('p-unit').value.trim() || '@',
                price: parseFloat(document.getElementById('p-price').value) || 0,
                description: document.getElementById('p-desc').value.trim(),
                photo_url: document.getElementById('p-photo').value.trim(),
                tg_user_id: tg?.initDataUnsafe?.user?.id
            };

            if (!data.name) return alert('Name is required');

            // Limit check for Basic
            if (!id && !store.is_pro && products.length >= 5 && !isDemo) {
                return alert('BASIC plan limit reached (5 products). Upgrade to PRO!');
            }

            if (isDemo) {
                if (id) {
                    const idx = products.findIndex(p => p.id == id);
                    products[idx] = { ...products[idx], ...data };
                } else {
                    products.push({ id: Date.now(), ...data, available: true, featured: false });
                }
                finishProductSave();
                return;
            }

            const endpoint = id ? '/catalog/api/product/update' : '/catalog/api/product/add';
            const payload = id ? { id, ...data } : data;

            fetch(endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(() => location.reload());
        }

        function finishProductSave() {
            renderProducts();
            renderStats();
            cancelEdit();
            switchTab('products');
            if (tg) tg.HapticFeedback?.notificationOccurred('success');
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;

            document.getElementById('edit-id').value = p.id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-cat').value = p.category;
            document.getElementById('p-unit').value = p.unit;
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-photo').value = p.photo_url || '';

            document.getElementById('form-title').textContent = 'Edit Product';
            document.getElementById('btn-save-product').textContent = 'Save Changes';
            document.getElementById('btn-cancel-edit').style.display = 'block';
            switchTab('add');
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = '';
            document.getElementById('p-name').value = '';
            document.getElementById('p-unit').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-photo').value = '';
            document.getElementById('form-title').textContent = 'New Product';
            document.getElementById('btn-save-product').textContent = 'Add Product';
            document.getElementById('btn-cancel-edit').style.display = 'none';
        }

        function toggleAvailable(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            p.available = !p.available;
            if (!isDemo) {
                fetch('/catalog/api/product/toggle', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, available: p.available, tg_user_id: tg?.initDataUnsafe?.user?.id })
                });
            }
            renderProducts();
            renderStats();
        }

        function toggleFeatured(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            if (!store.is_pro && !isDemo) return alert('★ Featured items is a PRO feature.');
            
            p.featured = !p.featured;
            if (!isDemo) {
                fetch('/catalog/api/product/featured', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, featured: p.featured, tg_user_id: tg?.initDataUnsafe?.user?.id })
                });
            }
            renderProducts();
        }

        function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            products = products.filter(p => p.id !== id);
            if (!isDemo) {
                fetch('/catalog/api/product/delete', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, tg_user_id: tg?.initDataUnsafe?.user?.id })
                });
            }
            renderProducts();
            renderStats();
        }

        function saveStoreSettings() {
            const data = {
                name: document.getElementById('s-name').value.trim(),
                logo_url: document.getElementById('s-logo').value.trim(),
                bio: document.getElementById('s-bio').value.trim(),
                min_order_amount: parseFloat(document.getElementById('s-min-order').value) || 0,
                is_pro: store.is_pro, // owner can't change this
                tg_user_id: tg?.initDataUnsafe?.user?.id
            };

            if (!data.name) return alert('Store Name is required');

            if (isDemo) {
                store = { ...store, ...data };
                alert('Demo settings saved!');
                renderHeader();
                return;
            }

            fetch('/catalog/api/store/settings', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(() => location.reload());
        }

        function selectColor(el) {
            if (!store.is_pro && !isDemo) return alert('🎨 Custom colors is a PRO feature.');
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
            el.classList.add('selected');
            const color = el.dataset.color;
            applyTheme(color);
            store.theme_color = color;
        }

        function applyTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
        }

        init();
    </script>
</body>
</html>
