<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catalog Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --accent: #00d26a; --bg: #0a0a0a; --card: #141414; --border: #1e1e1e; --text: #f0f0f0; --muted: #666; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; padding-bottom: 60px; }

        .header {
            background: var(--card); border-bottom: 1px solid var(--border);
            padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 50;
        }
        .header h1 { font-size: 1.1rem; font-weight: 700; }
        .header-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        .demo-badge {
            background: #FFD700; color: #000; font-size: 0.65rem;
            font-weight: 800; padding: 3px 10px; border-radius: 20px; letter-spacing: 1px;
        }

        /* Stats */
        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; padding: 16px;
        }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px; text-align: center;
        }
        .stat-val { font-size: 1.6rem; font-weight: 900; color: var(--accent); display: block; }
        .stat-lbl { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        /* Tab bar */
        .tab-bar {
            display: flex; gap: 8px; padding: 0 16px 12px;
            overflow-x: auto; scrollbar-width: none;
        }
        .tab-bar::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex-shrink: 0; background: var(--card); border: 1px solid var(--border);
            color: var(--muted); padding: 8px 16px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: 'Outfit', sans-serif; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

        /* Product list */
        .section { padding: 0 16px; }
        .section-title { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }

        .product-row {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px; margin-bottom: 10px;
            display: flex; align-items: center; gap: 12px;
        }
        .product-thumb {
            width: 52px; height: 52px; border-radius: 10px;
            object-fit: cover; background: #1a1a1a;
            flex-shrink: 0; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
        }
        .product-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
        .product-info { flex: 1; min-width: 0; }
        .product-name { font-size: 0.95rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-cat { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
        .product-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

        .toggle-btn {
            background: none; border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 12px;
            font-size: 0.72rem; font-weight: 700; cursor: pointer;
            font-family: 'Outfit', sans-serif; transition: all 0.2s; color: var(--text);
        }
        .toggle-btn.available { border-color: var(--accent); color: var(--accent); }
        .toggle-btn.unavailable { border-color: #ff4d4d; color: #ff4d4d; }

        .btn-icon {
            width: 32px; height: 32px; background: var(--border);
            border: none; border-radius: 8px; cursor: pointer; color: var(--text);
            font-size: 0.85rem; display: flex; align-items: center; justify-content: center;
        }

        /* Add product form */
        .form-section { padding: 0 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.72rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            color: var(--text); padding: 12px 14px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 0.9rem;
            outline: none; transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
        .form-group textarea { height: 80px; resize: none; }

        .cat-pills { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-pill {
            background: var(--card); border: 1px solid var(--border);
            color: var(--muted); padding: 7px 14px; border-radius: 20px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer;
            font-family: 'Outfit', sans-serif; transition: all 0.2s;
        }
        .cat-pill.selected { background: var(--accent); border-color: var(--accent); color: #000; }

        .availability-row { display: flex; gap: 10px; }
        .avail-btn {
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--card); color: var(--muted); font-family: 'Outfit', sans-serif;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .avail-btn.selected-yes { border-color: var(--accent); color: var(--accent); background: rgba(0,210,106,0.08); }
        .avail-btn.selected-no  { border-color: #ff4d4d; color: #ff4d4d; background: rgba(255,77,77,0.08); }

        .btn-submit {
            width: 100%; background: var(--accent); color: #000;
            border: none; border-radius: 14px; padding: 16px;
            font-size: 1rem; font-weight: 800; cursor: pointer;
            font-family: 'Outfit', sans-serif; margin-top: 10px;
            transition: opacity 0.2s;
        }
        .btn-submit:active { opacity: 0.8; }

        /* Store settings */
        .store-header {
            text-align: center; padding: 24px 20px;
            background: linear-gradient(180deg, rgba(0,210,106,0.1) 0%, transparent 100%);
        }
        .store-logo {
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid var(--accent); object-fit: cover;
            background: var(--card); display: flex; align-items: center; justify-content: center;
            font-size: 2rem; margin: 0 auto 12px;
        }
        .store-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .store-name { font-size: 1.4rem; font-weight: 900; }
        .store-slug { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
        .share-url-box {
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 12px; padding: 14px; margin: 16px;
            text-align: center;
        }
        .share-url-box p { font-size: 0.7rem; color: var(--muted); margin-bottom: 6px; }
        .share-url-box span { font-size: 0.85rem; font-weight: 700; color: var(--accent); }
        .btn-copy {
            width: calc(100% - 32px); margin: 0 16px;
            background: var(--accent); color: #000;
            border: none; border-radius: 14px; padding: 14px;
            font-size: 0.95rem; font-weight: 800; cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        /* Color picker */
        .color-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 0 16px; margin-bottom: 16px; }
        .color-swatch {
            width: 44px; height: 44px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: 0.2s;
        }
        .color-swatch.selected { border-color: #fff; transform: scale(1.1); }

        /* Empty state */
        .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
        .empty span { font-size: 2.5rem; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="header">
    <div>
        <div class="header h1" id="header-title" style="font-size:1.1rem;font-weight:700;">Catalog Manager</div>
        <div class="header-sub" id="header-sub">Loading...</div>
    </div>
    <span class="demo-badge" id="demo-badge" style="display:none;">DEMO</span>
</div>

<div id="app">
    <!-- Stats -->
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-val" id="stat-products">0</span><span class="stat-lbl">Products</span></div>
        <div class="stat-card"><span class="stat-val" id="stat-available">0</span><span class="stat-lbl">Available</span></div>
        <div class="stat-card"><span class="stat-val" id="stat-views">0</span><span class="stat-lbl">Views</span></div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
        <button class="tab-btn active" data-tab="products">📦 Products</button>
        <button class="tab-btn" data-tab="add">➕ Add Product</button>
        <button class="tab-btn" data-tab="store">⚙️ My Store</button>
    </div>

    <!-- Products Tab -->
    <div id="tab-products" class="section">
        <div class="section-title">Your Products</div>
        <div id="product-list"></div>
    </div>

    <!-- Add Product Tab -->
    <div id="tab-add" class="form-section" style="display:none;">
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="add-name" placeholder="e.g. OG Kush">
        </div>
        <div class="form-group">
            <label>Category</label>
            <div class="cat-pills" id="cat-pills">
                <button class="cat-pill selected" data-cat="flower">🌿 Flower</button>
                <button class="cat-pill" data-cat="extract">🧪 Extract</button>
                <button class="cat-pill" data-cat="edible">🍫 Edible</button>
                <button class="cat-pill" data-cat="accessory">🛒 Accessory</button>
                <button class="cat-pill" data-cat="other">✨ Other</button>
            </div>
        </div>
        <div class="form-group">
            <label>Description <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
            <textarea id="add-desc" placeholder="Describe this product..." maxlength="200"></textarea>
        </div>
        <div class="form-group">
            <label>Photo URL <span style="color:var(--muted);font-weight:400;">(optional)</span></label>
            <input type="url" id="add-photo" placeholder="https://...">
        </div>
        <div class="form-group">
            <label>Availability</label>
            <div class="availability-row">
                <button class="avail-btn selected-yes" id="avail-yes" onclick="selectAvail(true)">✅ Available</button>
                <button class="avail-btn" id="avail-no" onclick="selectAvail(false)">❌ Unavailable</button>
            </div>
        </div>
        <button class="btn-submit" onclick="addProduct()">Save Product</button>
    </div>

    <!-- Store Tab -->
    <div id="tab-store" style="display:none;">
        <div class="store-header">
            <div class="store-logo" id="store-logo">🌿</div>
            <div class="store-name" id="store-name-display">-</div>
            <div class="store-slug" id="store-slug-display">-</div>
        </div>
        <div class="share-url-box">
            <p>Your public catalog link:</p>
            <span id="store-url-display">-</span>
        </div>
        <button class="btn-copy" onclick="copyUrl()">🔗 Copy Catalog Link</button>
        <div style="padding:16px;">
            <div class="form-group" style="margin-top:12px;">
                <label>🎨 Theme Color</label>
                <div class="color-grid" id="color-grid">
                    <div class="color-swatch selected" style="background:#00d26a;" data-color="#00d26a" onclick="selectColor(this)"></div>
                    <div class="color-swatch" style="background:#9b59b6;" data-color="#9b59b6" onclick="selectColor(this)"></div>
                    <div class="color-swatch" style="background:#3498db;" data-color="#3498db" onclick="selectColor(this)"></div>
                    <div class="color-swatch" style="background:#FFD700;" data-color="#FFD700" onclick="selectColor(this)"></div>
                    <div class="color-swatch" style="background:#e74c3c;" data-color="#e74c3c" onclick="selectColor(this)"></div>
                    <div class="color-swatch" style="background:#e67e22;" data-color="#e67e22" onclick="selectColor(this)"></div>
                </div>
            </div>
            <button class="btn-submit" onclick="saveStoreColor()">Save Color</button>
        </div>
    </div>
</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

const DEMO_STORE = {
    id: 1, slug: 'hashandcrafts', name: 'HashAndCrafts',
    logo_url: '', bio: 'Premium genetics. Handcrafted with love.', theme_color: '#00d26a'
};

const DEMO_PRODUCTS = [
    { id: 1, store_id: 1, name: 'OG Kush', category: 'flower', description: 'Classic West Coast genetics. Earthy, pine, and lemon notes.', photo_url: 'https://images.unsplash.com/photo-1536819114556-1e10f967fb61?auto=format&fit=crop&q=80&w=400', available: true, featured: true },
    { id: 2, store_id: 1, name: 'Blue Dream', category: 'flower', description: 'Sweet berry aroma with full-body relaxation.', photo_url: 'https://images.unsplash.com/photo-1603398938378-e54eab446dde?auto=format&fit=crop&q=80&w=400', available: true, featured: false },
    { id: 3, store_id: 1, name: 'Live Resin 710', category: 'extract', description: 'Full-spectrum extract. Top-shelf terpene profile.', photo_url: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?auto=format&fit=crop&q=80&w=400', available: true, featured: false },
    { id: 4, store_id: 1, name: 'Gorilla Glue #4', category: 'flower', description: 'Heavy-handed euphoria and relaxation.', photo_url: '', available: false, featured: false },
    { id: 5, store_id: 1, name: 'Mango Gummies', category: 'edible', description: 'Tropical flavour, precisely dosed.', photo_url: 'https://images.unsplash.com/photo-1582798358481-d199fb7347bb?auto=format&fit=crop&q=80&w=400', available: true, featured: false },
    { id: 6, store_id: 1, name: 'Hash Rosin', category: 'extract', description: 'Cold-pressed solventless extraction. Pure and potent.', photo_url: '', available: true, featured: false },
];

const CAT_EMOJI = { flower: '🌿', extract: '🧪', edible: '🍫', accessory: '🛒', other: '✨' };
const CAT_LABELS = { flower: '🌿 Flower', extract: '🧪 Extract', edible: '🍫 Edible', accessory: '🛒 Accessory', other: '✨ Other' };

const params = new URLSearchParams(window.location.search);
const isDemo = params.get('demo') === 'true';
const slug = params.get('slug') || 'hashandcrafts';
const BASE = window.location.origin;

let store = null;
let products = [];
let selectedCat = 'flower';
let selectedAvail = true;
let currentTab = 'products';
let currentFilter = 'all';

async function init() {
    if (isDemo) {
        document.getElementById('demo-badge').style.display = 'inline-block';
        store = DEMO_STORE;
        products = JSON.parse(JSON.stringify(DEMO_PRODUCTS));
    } else {
        try {
            const res = await fetch(`/catalog/api/${slug}`);
            const data = await res.json();
            store = data.store;
            products = data.products;
        } catch {
            store = DEMO_STORE;
            products = JSON.parse(JSON.stringify(DEMO_PRODUCTS));
        }
    }
    applyTheme(store.theme_color);
    renderHeader();
    renderStats();
    renderProducts();
    renderStoreTab();
}

function applyTheme(color) {
    document.documentElement.style.setProperty('--accent', color);
}

function renderHeader() {
    document.getElementById('header-title').textContent = store.name;
    document.getElementById('header-sub').textContent = isDemo ? 'Demo Mode — no data is saved' : `@${store.slug}`;
}

function renderStats() {
    const avail = products.filter(p => p.available).length;
    document.getElementById('stat-products').textContent = products.length;
    document.getElementById('stat-available').textContent = avail;
    document.getElementById('stat-views').textContent = isDemo ? '2.4k' : '—';
}

function renderProducts() {
    const list = document.getElementById('product-list');
    if (!products.length) {
        list.innerHTML = `<div class="empty"><span>📦</span><p>No products yet. Add your first one!</p></div>`;
        return;
    }
    list.innerHTML = products.map(p => `
        <div class="product-row" id="prow-${p.id}">
            <div class="product-thumb">
                ${p.photo_url ? `<img src="${p.photo_url}" alt="${p.name}" onerror="this.parentElement.innerHTML='${CAT_EMOJI[p.category]}'">` : CAT_EMOJI[p.category]}
            </div>
            <div class="product-info">
                <div class="product-name">${p.name}</div>
                <div class="product-cat">${CAT_LABELS[p.category]}</div>
            </div>
            <div class="product-actions">
                <button class="toggle-btn ${p.available ? 'available' : 'unavailable'}" onclick="toggleProduct(${p.id})">
                    ${p.available ? '✅ Live' : '❌ Off'}
                </button>
                <button class="btn-icon" onclick="deleteProduct(${p.id})">🗑</button>
            </div>
        </div>
    `).join('');
}

function renderStoreTab() {
    if (!store) return;
    const logoEl = document.getElementById('store-logo');
    if (store.logo_url) {
        logoEl.innerHTML = `<img src="${store.logo_url}" alt="logo">`;
    }
    document.getElementById('store-name-display').textContent = store.name;
    document.getElementById('store-slug-display').textContent = `/${store.slug}`;
    document.getElementById('store-url-display').textContent = `${BASE}/catalog/${store.slug}`;
}

function toggleProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    p.available = !p.available;

    if (!isDemo) {
        fetch('/catalog/api/product/toggle', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, available: p.available, tg_user_id: tg?.initDataUnsafe?.user?.id })
        });
    }

    const btn = document.querySelector(`#prow-${id} .toggle-btn`);
    btn.className = `toggle-btn ${p.available ? 'available' : 'unavailable'}`;
    btn.textContent = p.available ? '✅ Live' : '❌ Off';
    renderStats();
    if (tg) tg.HapticFeedback?.impactOccurred('light');
}

function deleteProduct(id) {
    products = products.filter(x => x.id !== id);
    if (!isDemo) {
        fetch('/catalog/api/product/delete', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, tg_user_id: tg?.initDataUnsafe?.user?.id })
        });
    }
    renderProducts();
    renderStats();
    if (tg) tg.HapticFeedback?.impactOccurred('medium');
}

function selectAvail(val) {
    selectedAvail = val;
    document.getElementById('avail-yes').className = `avail-btn ${val ? 'selected-yes' : ''}`;
    document.getElementById('avail-no').className  = `avail-btn ${!val ? 'selected-no' : ''}`;
}

function addProduct() {
    const name = document.getElementById('add-name').value.trim();
    if (!name) return alert('Product name is required.');

    const newP = {
        id: Date.now(), store_id: store.id, name,
        category: selectedCat,
        description: document.getElementById('add-desc').value.trim(),
        photo_url: document.getElementById('add-photo').value.trim(),
        available: selectedAvail, featured: false
    };

    products.unshift(newP);

    if (!isDemo) {
        fetch('/catalog/api/product/add', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ...newP, tg_user_id: tg?.initDataUnsafe?.user?.id })
        });
    }

    // Reset form
    document.getElementById('add-name').value = '';
    document.getElementById('add-desc').value = '';
    document.getElementById('add-photo').value = '';
    selectAvail(true);

    renderProducts();
    renderStats();
    switchTab('products');
    if (tg) tg.HapticFeedback?.notificationOccurred('success');
}

function copyUrl() {
    const url = `${BASE}/catalog/${store.slug}`;
    navigator.clipboard.writeText(url).then(() => {
        if (tg) tg.HapticFeedback?.notificationOccurred('success');
        alert('✅ Link copied!');
    });
}

function selectColor(el) {
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    applyTheme(el.dataset.color);
}

function saveStoreColor() {
    const color = document.querySelector('.color-swatch.selected')?.dataset.color;
    if (!color || isDemo) return;
    fetch('/catalog/api/store/color', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slug: store.slug, color, tg_user_id: tg?.initDataUnsafe?.user?.id })
    }).then(() => { if (tg) tg.HapticFeedback?.notificationOccurred('success'); });
}

function switchTab(tab) {
    currentTab = tab;
    ['products', 'add', 'store'].forEach(t => {
        document.getElementById(`tab-${t}`).style.display = t === tab ? '' : 'none';
    });
    document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
    });
}

// Tab bar
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => switchTab(btn.dataset.tab);
});

// Category pills
document.querySelectorAll('.cat-pill').forEach(pill => {
    pill.onclick = () => {
        document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('selected'));
        pill.classList.add('selected');
        selectedCat = pill.dataset.cat;
    };
});

init();
</script>
</body>
</html>
