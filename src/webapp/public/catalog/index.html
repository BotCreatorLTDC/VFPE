<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catalog — Powered by VFPE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --accent: #00d26a;
            --bg: #0a0a0a;
            --card: #141414;
            --border: #1e1e1e;
            --text: #f0f0f0;
            --muted: #666;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* ── HERO ── */
        .hero {
            background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 20%, transparent) 0%, var(--bg) 100%);
            padding: 48px 20px 32px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .hero-logo {
            width: 88px; height: 88px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            margin-bottom: 16px;
            background: var(--card);
        }

        .hero-logo-placeholder {
            width: 88px; height: 88px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            background: var(--card);
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 16px;
        }

        .hero h1 {
            font-size: 1.8rem; font-weight: 900;
            letter-spacing: -0.5px;
        }

        .hero-bio {
            font-size: 0.9rem; color: var(--muted);
            margin-top: 8px; max-width: 300px;
            margin-left: auto; margin-right: auto;
            line-height: 1.5;
        }

        .hero-badge {
            display: inline-block;
            margin-top: 12px;
            font-size: 0.7rem; font-weight: 700;
            color: var(--accent);
            border: 1px solid color-mix(in srgb, var(--accent) 40%, transparent);
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        /* ── FILTERS ── */
        .filters {
            display: flex; gap: 8px;
            overflow-x: auto; padding: 16px 20px;
            scrollbar-width: none;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 10;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 0.8rem; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Outfit', sans-serif;
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }

        /* ── GRID ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 16px;
        }

        .product-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
        }

        .product-card:active { transform: scale(0.97); }

        .product-card.unavailable { opacity: 0.55; }

        .product-card.featured {
            border-color: var(--accent);
            grid-column: span 2;
        }

        .card-img {
            width: 100%; aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #1a1a1a;
        }

        .card-img-placeholder {
            width: 100%; aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #1a1a1a, #111);
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem;
        }

        .card-body {
            padding: 12px;
        }

        .card-category {
            font-size: 0.65rem; font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        /* ── GLASSMORPHISM & BLUR ── */
        .glass {
            background: rgba(20, 20, 20, 0.7) !important;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        .header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        /* ── SKELETON LOADERS ── */
        .skeleton {
            background: linear-gradient(90deg, #1a1a1a 25%, #222 50%, #1a1a1a 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: 12px;
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* ── SEARCH BAR ── */
        .search-container {
            padding: 0 20px 15px;
        }
        .search-box {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 10px;
        }
        .search-box input {
            background: none; border: none; color: #fff; width: 100%;
            font-family: 'Outfit', sans-serif; font-size: 0.95rem; outline: none;
        }

        /* ── FEATURED CAROUSEL ── */
        .featured-section { padding: 20px 0; overflow: hidden; }
        .featured-title { padding: 0 20px; margin-bottom: 12px; font-size: 0.8rem; color: var(--accent); font-weight: 800; letter-spacing: 1px; }
        .featured-track {
            display: flex; gap: 15px; overflow-x: auto; padding: 0 20px 10px;
            scrollbar-width: none;
        }
        .featured-track::-webkit-scrollbar { display: none; }
        .featured-card {
            flex-shrink: 0; width: 260px; height: 160px;
            border-radius: 20px; overflow: hidden; position: relative;
            background: var(--card); border: 1px solid var(--border);
        }
        .featured-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }
        .featured-info {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 15px; background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }

        /* ── SUCCESS SCREEN ── */
        .success-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 40px;
        }
        .success-overlay.open { display: flex; }
        .checkmark-circle {
            width: 100px; height: 100px; border-radius: 50%;
            background: var(--accent); color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin-bottom: 24px;
            box-shadow: 0 0 30px rgba(0,210,106,0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        .min-order-msg {
            color: #ff4d4d; font-size: 0.75rem; font-weight: 600; text-align: center;
            margin-top: 10px; display: none;
        }

        .card-price {
            font-size: 1.1rem; font-weight: 900;
            color: var(--accent); margin-top: 6px;
        }
        .card-price span { font-size: 0.75rem; color: var(--muted); font-weight: 400; margin-left: 2px; }

        .btn-add-cart {
            width: 100%; background: var(--accent); color: #000;
            border: none; border-radius: 10px; padding: 10px;
            font-size: 0.85rem; font-weight: 800; margin-top: 12px;
            cursor: pointer; font-family: 'Outfit', sans-serif;
        }

        /* ── CART UI ── */
        .cart-float {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--accent); color: #000;
            width: 60px; height: 60px; border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 24px rgba(0,210,106,0.3);
            z-index: 90; cursor: pointer;
            transition: transform 0.2s;
        }
        .cart-float:active { transform: scale(0.9); }
        .cart-count {
            position: absolute; top: -5px; right: -5px;
            background: #fff; color: #000;
            width: 24px; height: 24px; border-radius: 12px;
            font-size: 0.75rem; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid var(--accent);
        }

        .cart-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); z-index: 200;
            align-items: flex-end;
        }
        .cart-overlay.open { display: flex; }
        .cart-sheet {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px 24px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-height: 85vh; overflow-y: auto;
            padding: 24px 20px 40px; animation: slideUp 0.3s ease;
        }

        .cart-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 0.95rem; font-weight: 700; }
        .cart-item-price { font-size: 0.8rem; color: var(--accent); font-weight: 700; }
        .cart-controls { display: flex; align-items: center; gap: 12px; }
        .qty-btn {
            width: 32px; height: 32px; border-radius: 8px;
            border: 1px solid var(--border); background: #1a1a1a;
            color: #fff; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-val { font-weight: 700; font-size: 1rem; width: 20px; text-align: center; }

        .cart-footer { margin-top: 24px; }
        .cart-total-row {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; padding-top: 15px; border-top: 2px dashed var(--border);
        }
        .total-lbl { font-size: 1rem; color: var(--muted); font-weight: 600; }
        .total-val { font-size: 1.8rem; font-weight: 900; color: var(--accent); }

        .btn-order {
            width: 100%; background: var(--accent); color: #000;
            border: none; border-radius: 16px; padding: 18px;
            font-size: 1.1rem; font-weight: 900; cursor: pointer;
            font-family: 'Outfit', sans-serif;
        }

        .order-form {
            margin-top: 20px; padding-top: 20px;
            border-top: 1px solid var(--border);
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 700; color: var(--accent); margin-bottom: 6px; text-transform: uppercase; }
        .form-group input, .form-group textarea {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border);
            color: #fff; padding: 12px; border-radius: 12px;
            font-family: 'Outfit', sans-serif; font-size: 0.9rem;
        }
        .form-group input:focus { border-color: var(--accent); outline: none; }

        .card-status {
            margin-top: 8px;
            display: inline-block;
            font-size: 0.65rem; font-weight: 700;
            padding: 3px 8px; border-radius: 10px;
            background: color-mix(in srgb, var(--accent) 15%, transparent);
            color: var(--accent);
        }

        .card-status.unavailable {
            background: rgba(255,77,77,0.12);
            color: #ff4d4d;
        }

        /* ── MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: flex-end;
        }

        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px 24px 0 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%; max-height: 85vh;
            overflow-y: auto;
            padding: 24px 20px 40px;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: #333; border-radius: 2px;
            margin: 0 auto 20px;
        }

        .modal-img {
            width: 100%; max-height: 260px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .modal-category {
            font-size: 0.75rem; font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-name {
            font-size: 1.6rem; font-weight: 900;
            margin: 6px 0 12px;
            letter-spacing: -0.5px;
        }

        .modal-desc {
            font-size: 0.9rem; color: #aaa;
            line-height: 1.6;
        }

        .modal-status-row {
            display: flex; align-items: center; gap: 10px;
            margin-top: 20px;
            padding: 12px 16px;
            background: #0f0f0f;
            border-radius: 12px;
        }

        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent);
        }
        .status-dot.unavailable { background: #ff4d4d; }

        .status-text {
            font-size: 0.85rem; font-weight: 600;
        }

        .modal-close {
            position: absolute; top: 16px; right: 16px;
            background: #222; border: none; color: #fff;
            width: 32px; height: 32px; border-radius: 50%;
            font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* ── EMPTY ── */
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty p { margin-top: 12px; font-size: 0.9rem; }

        /* ── LOADING ── */
        .loading {
            text-align: center; padding: 80px 20px; color: var(--muted);
        }

        /* ── FOOTER ── */
        .powered-by {
            text-align: center;
            font-size: 0.7rem; color: var(--muted);
            padding: 20px;
            border-top: 1px solid var(--border);
            margin-top: 20px;
        }
        .powered-by span { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="header">
            <div style="padding: 16px 20px;"><div class="skeleton" style="width:120px; height:24px;"></div></div>
        </div>
        <div style="padding: 20px;">
            <div class="skeleton" style="width:100%; height:180px; margin-bottom:20px;"></div>
            <div class="grid">
                <div class="skeleton" style="height:240px;"></div>
                <div class="skeleton" style="height:240px;"></div>
                <div class="skeleton" style="height:240px;"></div>
                <div class="skeleton" style="height:240px;"></div>
            </div>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="hero" id="hero">
            <!-- Injected by JS -->
        </div>

        <!-- Search & Filters -->
        <div class="search-container">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="search-input" placeholder="Search products..." oninput="handleSearch()">
            </div>
        </div>

        <!-- Featured Section (PRO only) -->
        <div id="featured-section" class="featured-section" style="display:none;">
            <div class="featured-title">⭐ FEATURED SELECTION</div>
            <div class="featured-track" id="featured-track"></div>
        </div>

        <div class="filters" id="filters">
            <button class="filter-btn active" data-cat="all">🌐 All</button>
            <button class="filter-btn" data-cat="flower">🌿 Flower</button>
            <button class="filter-btn" data-cat="extract">🧪 Extract</button>
            <button class="filter-btn" data-cat="edible">🍫 Edible</button>
            <button class="filter-btn" data-cat="accessory">🛒 Accessories</button>
            <button class="filter-btn" data-cat="other">✨ Other</button>
        </div>

        <div class="grid" id="product-grid"></div>

        <div class="powered-by">Powered by <span>VFPE</span> — Europe's Verified Plug Directory</div>
    </div>

    <!-- Floating Cart Button -->
    <div class="cart-float" id="cart-float" style="display:none;" onclick="openCart()">
        <span style="font-size:1.5rem">🛒</span>
        <div class="cart-count" id="cart-count">0</div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="modal" onclick="if(event.target === this) this.classList.remove('open')">
        <div class="modal-sheet" id="modal-sheet">
            <div class="modal-handle"></div>
            <button class="modal-close" onclick="document.getElementById('modal').classList.remove('open')">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <!-- Cart Overlay -->
    <div class="cart-overlay" id="cart-overlay">
        <div class="cart-sheet">
            <div class="modal-handle"></div>
            <h2 style="font-size:1.5rem; font-weight:900; margin-bottom:20px;">Shopping Cart</h2>
            
            <div id="cart-items"></div>

            <div class="order-form">
                <div class="form-group">
                    <label>📍 Delivery Address</label>
                    <textarea id="order-address" placeholder="Street, number, floor, city..." rows="2"></textarea>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div class="form-group">
                        <label>📞 Phone (Opt)</label>
                        <input type="text" id="order-phone" placeholder="+34...">
                    </div>
                    <div class="form-group">
                        <label>💬 Notes</label>
                        <input type="text" id="order-notes" placeholder="Extra info...">
                    </div>
                </div>
            </div>

            <div class="cart-footer">
                <div class="cart-total-row">
                    <span class="total-lbl">Total Order</span>
                    <span class="total-val" id="cart-total">0.00€</span>
                </div>
                <div id="min-order-msg" class="min-order-msg">Minimum order is <span>0.00€</span></div>
                <button class="btn-order" id="btn-submit-order" onclick="submitOrder()">🚀 Send Order to Plug</button>
            </div>
        </div>
    </div>

    <!-- Success Screen -->
    <div class="success-overlay" id="success-overlay">
        <div class="checkmark-circle">✓</div>
        <h2 style="font-size:2rem; font-weight:900; margin-bottom:10px;">ORDER SENT!</h2>
        <p style="color:var(--muted); font-size:1.1rem; line-height:1.5; margin-bottom:30px;">
            The plug has received your order.<br>They will contact you on Telegram soon.
        </p>
        <button class="btn-order" style="width:200px;" onclick="location.reload()">Back to Catalog</button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { 
            tg.expand(); 
            tg.ready(); 
            
            // Show Native Back Button to return to Directory
            tg.BackButton.show();
            tg.BackButton.onClick(() => {
                window.location.href = '/';
            });
        }

        const CATEGORY_LABELS = {
            flower: '🌿 Flower', extract: '🧪 Extract',
            edible: '🍫 Edible', accessory: '🛒 Accessory', other: '✨ Other'
        };
        const CATEGORY_EMOJI = {
            flower: '🌿', extract: '🧪', edible: '🍫', accessory: '🛒', other: '✨'
        };

        const DEMO_STORE = {
            id: 1, slug: 'hashandcrafts', name: 'HashAndCrafts',
            logo_url: '', bio: 'Premium genetics. Handcrafted with love.', 
            theme_color: '#00d26a', min_order_amount: 50, is_pro: true
        };
        const DEMO_PRODUCTS = [
            { id: 1, name: 'OG Kush',       category: 'flower',  price: 10, unit: 'g', description: 'Classic West Coast genetics. Earthy, pine, and lemon notes.', photo_url: '', available: true,  featured: true  },
            { id: 2, name: 'Blue Dream',     category: 'flower',  price: 12, unit: 'g', description: 'Sweet berry aroma with full-body relaxation.',                photo_url: '', available: true,  featured: false },
            { id: 3, name: 'Live Resin 710', category: 'extract', price: 40, unit: 'g', description: 'Full-spectrum extract. Top-shelf terpene profile.',           photo_url: '', available: true,  featured: false },
            { id: 4, name: 'Gorilla Glue',   category: 'flower',  price: 10, unit: 'g', description: 'Heavy-handed euphoria and relaxation.',                       photo_url: '', available: false, featured: false },
            { id: 5, name: 'Mango Gummies',  category: 'edible',  price: 25, unit: 'pack', description: 'Tropical flavour, precisely dosed.',                          photo_url: '', available: true,  featured: false },
            { id: 6, name: 'Hash Rosin',     category: 'extract', price: 60, unit: 'g', description: 'Cold-pressed solventless extraction. Pure and potent.',       photo_url: '', available: true,  featured: false },
        ];

        const params = new URLSearchParams(window.location.search);
        const isDemo = params.get('demo') === 'true';
        let slug = window.location.pathname.split('/').filter(Boolean).pop();

        // Handle Telegram Start Parameter (Deep Linking)
        if (tg?.initDataUnsafe?.start_param) {
            slug = tg.initDataUnsafe.start_param;
        }

        let store = null;
        let allProducts = [];
        let currentFilter = 'all';
        let searchQuery = '';
        let cart = [];
        let modalQty = 1;

        async function loadCatalog() {
            let products;
            if (isDemo) {
                store = DEMO_STORE;
                products = DEMO_PRODUCTS;
            } else {
                try {
                    const res = await fetch(`/catalog/api/${slug}`);
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    store = data.store;
                    products = data.products;
                } catch {
                    document.getElementById('loading').innerHTML = '<div>😕</div><p>Catalog not found.</p>';
                    return;
                }
            }

            applyTheme(store.theme_color);
            renderHero(store);
            allProducts = products;
            renderFeatured();
            renderProducts();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        }

        function renderFeatured() {
            const section = document.getElementById('featured-section');
            const track = document.getElementById('featured-track');
            const featured = allProducts.filter(p => p.featured && p.available);

            if (!store.is_pro || featured.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            track.innerHTML = featured.map(p => `
                <div class="featured-card" onclick="openModal(${p.id})">
                    ${p.photo_url ? `<img src="${p.photo_url}" class="featured-img">` : `<div style="height:100%; display:flex; align-items:center; justify-content:center; font-size:4rem; opacity:0.2;">${CATEGORY_EMOJI[p.category]}</div>`}
                    <div class="featured-info">
                        <div style="font-size:0.7rem; color:var(--accent); font-weight:800;">TOP PICK</div>
                        <div style="font-weight:700; font-size:1rem; margin:2px 0;">${p.name}</div>
                        <div style="font-size:0.85rem; font-weight:600;">${p.price}€ / ${p.unit}</div>
                    </div>
                </div>
            `).join('');
        }

        function applyTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
        }

        function renderHero(store) {
            const heroEl = document.getElementById('hero');
            const logoHtml = store.logo_url
                ? `<img src="${store.logo_url}" alt="Logo" class="hero-logo" onerror="this.style.display='none'">`
                : `<div class="hero-logo-placeholder">🌿</div>`;

            heroEl.innerHTML = `
                ${logoHtml}
                <h1>${store.name}</h1>
                ${store.bio ? `<p class="hero-bio">${store.bio}</p>` : ''}
                <span class="hero-badge">✅ VERIFIED CATALOG</span>
            `;
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            let filtered = allProducts;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(p => p.category === currentFilter);
            }

            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                filtered = filtered.filter(p => p.name.toLowerCase().includes(q));
            }

            if (!filtered.length) {
                grid.innerHTML = `<div class="empty" style="grid-column:span 2">
                    <div style="font-size:2.5rem">😕</div>
                    <p>No products found matching your search.</p>
                </div>`;
                return;
            }

            grid.innerHTML = filtered.map(p => `
                <div class="product-card ${!p.available ? 'unavailable' : ''} ${p.featured ? 'featured' : ''}"
                     onclick="openModal(${p.id})">
                    ${p.photo_url
                        ? `<img src="${p.photo_url}" class="card-img" alt="${p.name}" onerror="this.outerHTML='<div class=\\'card-img-placeholder\\'>${CATEGORY_EMOJI[p.category] || '🌿'}</div>'">`
                        : `<div class="card-img-placeholder">${CATEGORY_EMOJI[p.category] || '🌿'}</div>`
                    }
                    <div class="card-body">
                        <div class="card-category">${CATEGORY_LABELS[p.category]}</div>
                        <div class="card-name">${p.name}</div>
                        <div class="card-price">${p.price}€<span>/${p.unit}</span></div>
                        <button class="btn-add-cart" onclick="event.stopPropagation(); addToCart(${p.id})">
                            ADD TO CART
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ── CART LOGIC ──
        function addToCart(productId, quantity = 1) {
            const p = allProducts.find(x => x.id === productId);
            if (!p || !p.available) return;

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.qty += quantity;
            } else {
                cart.push({ ...p, qty: quantity });
            }
            updateCartUI();
            if (tg) tg.HapticFeedback?.impactOccurred('medium');
        }

        function updateCartUI() {
            const float = document.getElementById('cart-float');
            const count = document.getElementById('cart-count');
            const itemsContainer = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');

            const totalQty = cart.reduce((acc, item) => acc + item.qty, 0);
            const totalMoney = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            float.style.display = totalQty > 0 ? 'flex' : 'none';
            count.textContent = totalQty;
            totalEl.textContent = totalMoney.toFixed(2) + '€';

            // Min order check
            const minAmount = store?.min_order_amount || 0;
            const minMsg = document.getElementById('min-order-msg');
            const submitBtn = document.getElementById('btn-submit-order');
            
            if (totalMoney > 0 && totalMoney < minAmount) {
                minMsg.style.display = 'block';
                minMsg.querySelector('span').textContent = minAmount.toFixed(2) + '€';
                submitBtn.style.opacity = '0.5';
                submitBtn.style.pointerEvents = 'none';
            } else {
                minMsg.style.display = 'none';
                submitBtn.style.opacity = '1';
                submitBtn.style.pointerEvents = 'auto';
            }

            itemsContainer.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price}€ / ${item.unit}</div>
                    </div>
                    <div class="cart-controls">
                        <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                        <span class="qty-val">${item.qty}</span>
                        <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(id, delta) {
            const item = cart.find(x => x.id === id);
            if (!item) return;
            item.qty += delta;
            if (item.qty <= 0) {
                cart = cart.filter(x => x.id !== id);
            }
            updateCartUI();
            if (tg) tg.HapticFeedback?.impactOccurred('light');
        }

        function openCart() {
            document.getElementById('cart-overlay').classList.add('open');
        }

        function submitOrder() {
            if (!cart.length) return;

            const address = document.getElementById('order-address').value.trim();
            const phone = document.getElementById('order-phone').value.trim();
            const notes = document.getElementById('order-notes').value.trim();

            if (!address) {
                alert('⚠️ Please enter a delivery address.');
                document.getElementById('order-address').focus();
                return;
            }
            
            const summary = cart.map(item => `- ${item.qty}x ${item.name} (${(item.price * item.qty).toFixed(2)}€)`).join('\n');
            const total = cart.reduce((acc, item) => acc + (item.price * item.qty), 0).toFixed(2);
            
            const orderData = {
                slug,
                address, phone, notes,
                items: cart.map(i => ({ name: i.name, qty: i.qty, price: i.price })),
                total: total,
                user: tg?.initDataUnsafe?.user || { first_name: 'Customer' }
            };

            if (isDemo) {
                cart = [];
                updateCartUI();
                document.getElementById('cart-overlay').classList.remove('open');
                document.getElementById('success-overlay').classList.add('open');
                if (tg) tg.HapticFeedback?.notificationOccurred('success');
                return;
            }

            // Real submit
            fetch('/catalog/api/order/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            }).then(res => res.json()).then(data => {
                if (data.ok) {
                    cart = [];
                    updateCartUI();
                    document.getElementById('cart-overlay').classList.remove('open');
                    document.getElementById('success-overlay').classList.add('open');
                    if (tg) tg.HapticFeedback?.notificationOccurred('success');
                } else {
                    alert('❌ Error sending order. Try again.');
                }
            });
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim();
            renderProducts();
        }

        function openModal(productId) {
            const p = allProducts.find(x => x.id === productId);
            if (!p) return;

            // Ensure price is a number
            const price = parseFloat(p.price) || 0;
            modalQty = 1; 

            const content = document.getElementById('modal-content');
            content.innerHTML = `
                ${p.photo_url ? `<img src="${p.photo_url}" class="modal-img" alt="${p.name}">` : ''}
                <div class="modal-category">${CATEGORY_LABELS[p.category]}</div>
                <h2 class="modal-name">${p.name}</h2>
                <div class="card-price" style="font-size:1.5rem; margin-bottom:15px;">${price.toFixed(2)}€ <span style="font-size:1rem;">/${p.unit}</span></div>
                ${p.description ? `<p class="modal-desc">${p.description}</p>` : ''}
                <div class="modal-status-row">
                    <div class="status-dot ${!p.available ? 'unavailable' : ''}"></div>
                    <span class="status-text">${p.available ? 'Currently Available' : 'Currently Unavailable'}</span>
                </div>
                
                ${p.available ? `
                    <div style="margin-top:25px; border-top:1px solid var(--border); padding-top:20px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <span style="font-size:0.9rem; font-weight:700; color:var(--muted);">QUANTITY</span>
                            <div class="cart-controls">
                                <button class="qty-btn" onclick="updateModalQty(${p.id}, -1)">-</button>
                                <span class="qty-val" id="modal-qty-val">1</span>
                                <button class="qty-btn" onclick="updateModalQty(${p.id}, 1)">+</button>
                            </div>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                            <span style="font-size:0.9rem; font-weight:700; color:var(--muted);">SUBTOTAL</span>
                            <span style="font-size:1.3rem; font-weight:900; color:var(--accent);" id="modal-subtotal">${price.toFixed(2)}€</span>
                        </div>
                        <button class="btn-order" onclick="addToCart(${p.id}, modalQty); document.getElementById('modal').classList.remove('open');">
                            ADD TO ORDER
                        </button>
                    </div>
                ` : ''}
            `;

            document.getElementById('modal').classList.add('open');
            if (tg) tg.HapticFeedback?.impactOccurred('light');
        }

        function updateModalQty(productId, delta) {
            const p = allProducts.find(x => x.id === productId);
            if (!p) return;

            const price = parseFloat(p.price) || 0;
            modalQty += delta;
            if (modalQty < 1) modalQty = 1;

            document.getElementById('modal-qty-val').textContent = modalQty;
            document.getElementById('modal-subtotal').textContent = (price * modalQty).toFixed(2) + '€';
            
            if (tg) tg.HapticFeedback?.impactOccurred('light');
        }

        // Filters
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.cat;
                renderProducts();
            };
        });

        // Close modal
        document.getElementById('modal').onclick = (e) => {
            if (e.target === document.getElementById('modal')) {
                document.getElementById('modal').classList.remove('open');
            }
        };

        document.getElementById('cart-overlay').onclick = (e) => {
            if (e.target === document.getElementById('cart-overlay')) {
                document.getElementById('cart-overlay').classList.remove('open');
            }
        };

        loadCatalog();
    </script>
</body>
</html>
