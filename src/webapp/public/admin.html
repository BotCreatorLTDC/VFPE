<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFPE Mobile Admin</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="mobile-admin">
    <div id="auth-loading" class="full-screen-msg">
        <div class="spinner"></div>
        <p>Authenticating Admin...</p>
    </div>

    <div id="admin-app" style="display: none;">
        <header class="app-header">
            <div class="brand">
                <h1>VFPE</h1>
                <span>ADMIN HQ</span>
            </div>
            <button id="refresh-btn">🔄</button>
        </header>

        <section class="quick-stats">
            <div class="stat-bubble" id="stat-pending-bubble">
                <span class="val" id="stat-pending">0</span>
                <span class="lbl">Pending</span>
            </div>
            <div class="stat-bubble">
                <span class="val" id="stat-clicks">0</span>
                <span class="lbl">Total Clicks</span>
            </div>
        </section>

        <nav class="tab-bar">
            <button class="tab-item active" data-filter="pending">⏳ Inbox</button>
            <button class="tab-item" data-filter="verified">✅ Active</button>
            <button class="tab-item" data-filter="analytics">📊 Stats</button>
            <button class="tab-item" data-filter="all">📦 All</button>
        </nav>

        <main id="main-view">
            <div id="clubs-list" class="card-list">
                <!-- Cards injected here -->
            </div>

            <div id="analytics-view" class="analytics-container" style="display: none;">
                <div class="analytics-card">
                    <h3>Top Cities</h3>
                    <ul id="top-cities-list"></ul>
                </div>
                <div class="analytics-card">
                    <h3>Most Popular Clubs</h3>
                    <ul id="top-clubs-list"></ul>
                </div>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
