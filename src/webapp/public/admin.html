<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VFPE Mobile Admin</title>
    <link rel="stylesheet" href="admin.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="mobile-admin">
    <div id="auth-loading" class="full-screen-msg">
        <div class="spinner"></div>
        <p>Authenticating Admin...</p>
    </div>

    <div id="admin-app" style="display: none;">
        <header class="app-header">
            <div class="brand">
                <img src="/assets/logo.jpg" alt="VFPE Logo" class="brand-logo-m">
                <span>ADMIN HQ</span>
            </div>
            <button id="refresh-btn">🔄</button>
        </header>

        <section class="quick-stats">
            <div class="stat-bubble" id="stat-pending-bubble">
                <span class="val" id="stat-pending">0</span>
                <span class="lbl">Pending</span>
            </div>
            <div class="stat-bubble">
                <span class="val" id="stat-clicks">0</span>
                <span class="lbl">Total Clicks</span>
            </div>
        </section>

        <nav class="tab-bar">
            <button class="tab-item active" data-filter="pending">⏳ Inbox</button>
            <button class="tab-item" data-filter="accepted">💳 Payment</button>
            <button class="tab-item" data-filter="verified">✅ Active</button>
            <button class="tab-item" data-filter="reports">⚠️ Reports</button>
            <button class="tab-item" data-filter="analytics">📊 Stats</button>
            <button class="tab-item" data-filter="all">📦 All</button>
        </nav>

        <main id="main-view">
            <div id="clubs-list" class="card-list">
                <!-- Cards injected here -->
            </div>

            <div id="analytics-view" class="analytics-container" style="display: none;">
                <div class="analytics-card">
                    <h3>Top Cities</h3>
                    <ul id="top-cities-list"></ul>
                </div>
                <div class="analytics-card">
                    <h3>Most Popular Plugs</h3>
                    <ul id="top-clubs-list"></ul>
                </div>
            </div>

            <div id="reports-view" class="card-list" style="display: none;">
                <!-- Reports injected here -->
            </div>
        </main>
    </div>

    <!-- Admin Edit Modal -->
    <div id="edit-modal" class="modal-overlay" style="display: none;">
        <div class="modal-card">
            <div class="modal-header">
                <h2>📝 Edit Plug Data</h2>
                <button id="close-modal">✕</button>
            </div>
            <form id="edit-form">
                <input type="hidden" id="edit-id">
                
                <div class="input-group">
                    <label>Plug Name</label>
                    <input type="text" id="edit-name" required>
                </div>

                <div class="input-group">
                    <label>Country (ISO Code: ES, DE, NL)</label>
                    <input type="text" id="edit-country" required maxlength="2">
                </div>

                <div class="input-group">
                    <label>City</label>
                    <input type="text" id="edit-city" required>
                </div>

                <div class="input-group">
                    <label>Telegram @username</label>
                    <input type="text" id="edit-tg" required>
                </div>

                <div class="input-group">
                    <label>Instagram @username</label>
                    <input type="text" id="edit-ig">
                </div>

                <div class="input-group" id="event-group" style="border: 1px solid #FFD700; padding: 10px; border-radius: 10px; margin-top: 10px;">
                    <label>⚡ Evento 24h (Solo Advanced)</label>
                    <input type="text" id="edit-event" placeholder="Ej: ¡Nuevo stock de flores! 🔥">
                    <small style="color:#888;">Si escribes algo, se activará por 24h desde ahora.</small>
                </div>

                <div class="input-group">
                    <label>🖼 Photo URL (imagen del club)</label>
                    <input type="text" id="edit-photo" placeholder="https://... (enlace a imagen)">
                </div>

                <div class="input-group" style="border: 1px solid #333; padding: 10px; border-radius: 10px;">
                    <label>🏷 Service Tags</label>
                    <div style="display:flex; gap:12px; flex-wrap:wrap; margin-top:8px;">
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem;">
                            <input type="checkbox" id="tag-delivery" value="delivery"> 🚚 Delivery
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem;">
                            <input type="checkbox" id="tag-meetup" value="meetup"> 🤝 Meetup
                        </label>
                        <label style="display:flex;align-items:center;gap:6px;font-size:0.9rem;">
                            <input type="checkbox" id="tag-postal" value="postal"> 📬 Postal
                        </label>
                    </div>
                </div>

                <div class="input-group">
                    <label>Description (max 200 chars)</label>
                    <textarea id="edit-desc" maxlength="200"></textarea>
                </div>

                <button type="submit" class="btn-save">💾 Save Changes</button>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
