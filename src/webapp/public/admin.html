<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFPE Admin Dashboard</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="auth-overlay" class="overlay">
        <div class="auth-card">
            <h2>🔐 Admin Access</h2>
            <p>Enter the secret key to manage VFPE ecosystem.</p>
            <input type="password" id="admin-secret-input" placeholder="Enter Secret Key...">
            <button id="login-btn">Unlock Dashboard</button>
            <p id="auth-error" class="error"></p>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo-area">
                <h1>VFPE</h1>
                <span>Admin Panel</span>
            </div>
            <nav>
                <button class="nav-item active" data-filter="all">📦 All Clubs</button>
                <button class="nav-item" data-filter="pending">⏳ Pending</button>
                <button class="nav-item" data-filter="verified">✅ Verified</button>
                <button class="nav-item" data-filter="rejected">❌ Rejected</button>
            </nav>
            <div class="sidebar-footer">
                <button id="logout-btn">Logout</button>
            </div>
        </aside>

        <main class="content">
            <header class="main-header">
                <div class="header-info">
                    <h2 id="view-title">All Clubs</h2>
                    <p id="club-count-total">Loading statistics...</p>
                </div>
                <div class="header-actions">
                    <button id="refresh-btn">🔄 Refresh Data</button>
                </div>
            </header>

            <section class="stats-grid">
                <div class="stat-card">
                    <h3>Total</h3>
                    <p id="stat-total">-</p>
                </div>
                <div class="stat-card pending">
                    <h3>Pending</h3>
                    <p id="stat-pending">-</p>
                </div>
                <div class="stat-card verified">
                    <h3>Verified</h3>
                    <p id="stat-verified">-</p>
                </div>
            </section>

            <div class="table-container">
                <table id="clubs-table">
                    <thead>
                        <tr>
                            <th>Club Name</th>
                            <th>Location</th>
                            <th>Contact</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="clubs-body">
                        <!-- Content injected by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="admin.js"></script>
</body>
</html>
