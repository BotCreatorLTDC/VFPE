<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VFPE - Ultra Premium Ad</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d26a;
            --gold: #FFD700;
            --bg: #000000;
            --duration: 5500ms;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .story-viewport {
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 800px;
            background: #000;
            position: relative;
            overflow: hidden;
            perspective: 2000px; /* Para efectos 3D */
        }

        /* Fondo Dinámico con Partículas */
        .bg-elements {
            position: absolute; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .particle {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 70%);
            filter: blur(40px); opacity: 0.15;
            animation: floatBg 20s infinite alternate;
        }

        @keyframes floatBg {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.5); }
        }

        /* Barra de Progreso */
        .progress-container {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; gap: 4px; z-index: 100;
        }
        .progress-segment {
            flex: 1; height: 3px; background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: #fff; width: 0%;
        }
        .active-fill { animation: fillProgress var(--duration) linear forwards; }
        @keyframes fillProgress { from { width: 0%; } to { width: 100%; } }

        /* Estructura de Escena */
        .scene {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden;
            display: flex; flex-direction: column;
            transition: opacity 0.6s ease;
            z-index: 5;
        }
        .scene.active { opacity: 1; visibility: visible; }

        /* Animaciones de Texto Premium */
        .text-box {
            position: absolute; padding: 30px; z-index: 20;
            width: 100%;
        }
        .scene.active .title { animation: textIn 1s cubic-bezier(0.19, 1, 0.22, 1) both; }
        .scene.active .sub { animation: textIn 1s cubic-bezier(0.19, 1, 0.22, 1) 0.2s both; }

        @keyframes textIn {
            from { opacity: 0; transform: translateY(40px) skewY(5deg); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) skewY(0); filter: blur(0); }
        }

        .title { font-size: 3.5rem; font-weight: 900; line-height: 1; margin-bottom: 10px; color: var(--accent); }
        .sub { font-size: 1.3rem; color: #888; font-weight: 400; max-width: 80%; }

        /* Contenedor 3D del Dispositivo */
        .device-container {
            position: absolute; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 10; pointer-events: none;
        }

        .phone {
            width: 280px; height: 580px; background: #000;
            border-radius: 40px; border: 6px solid #222;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            overflow: hidden;
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .phone img {
            width: 100%; height: 100%; object-fit: cover;
            animation: imgPan 10s ease-in-out infinite alternate;
        }

        @keyframes imgPan {
            from { transform: scale(1.1) translateY(0); }
            to { transform: scale(1.1) translateY(-30px); }
        }

        /* Posiciones dinámicas por Escena */
        
        /* Scene 1: Intro */
        .scene-1 { justify-content: center; align-items: center; text-align: center; }
        .scene-1 .title { font-size: 6rem; color: #fff; letter-spacing: -4px; }
        .scene-1 .badge { background: var(--accent); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 900; margin-bottom: 10px; display: inline-block; }

        /* Scene 2: Trust (Phone tilts Right, Text Top Left) */
        .scene-2 .text-box { top: 80px; text-align: left; }
        .scene.active.scene-2 ~ .device-container .phone {
            transform: translate(40px, 120px) rotateY(-20deg) rotateX(10deg) rotateZ(5deg) scale(0.9);
        }

        /* Scene 3: Map (Phone tilts Left, Text Bottom Right) */
        .scene-3 .text-box { bottom: 80px; text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
        .scene.active.scene-3 ~ .device-container .phone {
            transform: translate(-50px, -100px) rotateY(25deg) rotateX(-5deg) rotateZ(-10deg) scale(1.1);
        }

        /* Scene 4: Catalog (Phone Center Zoom) */
        .scene-4 .text-box { top: 60px; text-align: center; }
        .scene.active.scene-4 ~ .device-container .phone {
            transform: translate(0, 50px) rotateY(0) rotateX(15deg) scale(0.95);
        }

        /* Scene 5: Final (Phone Out, Full Logo) */
        .scene-5 { justify-content: center; align-items: center; text-align: center; }
        .scene.active.scene-5 ~ .device-container .phone {
            transform: translateY(800px) scale(0.5); opacity: 0;
        }

        .cta-btn {
            margin-top: 30px; padding: 15px 40px; background: var(--accent);
            color: #000; font-weight: 900; border-radius: 50px;
            font-size: 1.2rem; letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,210,106,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(0,210,106,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,210,106,0); }
        }

    </style>
</head>
<body>

    <div class="story-viewport">
        <!-- Background elements -->
        <div class="bg-elements">
            <div class="particle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
            <div class="particle" style="width: 250px; height: 250px; bottom: -50px; right: -50px; background: var(--gold); opacity: 0.1;"></div>
        </div>

        <div class="progress-container" id="progress-bar"></div>

        <!-- SCENE 1: THE BRAND -->
        <div class="scene scene-1 active" data-img="" data-duration="4000">
            <div class="text-box">
                <div class="badge">ESTÁNDAR GLOBAL</div>
                <div class="title">VFPE</div>
                <div class="sub">El nuevo nivel de los perfiles verificados.</div>
            </div>
        </div>

        <!-- SCENE 2: THE TRUST -->
        <div class="scene scene-2" data-img="assets/Final_Presentation/Screenshot_2026-05-04-13-10-17-908_org.telegram.messenger-edit.jpg" data-duration="5500">
            <div class="text-box">
                <div class="title">TRUST</div>
                <div class="sub">Se acabaron las dudas. Solo perfiles reales y contrastados.</div>
            </div>
        </div>

        <!-- SCENE 3: THE MAP -->
        <div class="scene scene-3" data-img="assets/Final_Presentation/Screenshot_2026-05-04-13-10-30-666_org.telegram.messenger-edit.jpg" data-duration="5500">
            <div class="text-box">
                <div class="title">MAPS</div>
                <div class="sub">Navegación inteligente por zonas. Todo bajo control.</div>
            </div>
        </div>

        <!-- SCENE 4: CATALOG -->
        <div class="scene scene-4" data-img="assets/Final_Presentation/Screenshot_2026-05-04-13-18-59-167_org.telegram.messenger-edit.jpg" data-duration="5500">
            <div class="text-box">
                <div class="title">SHOP</div>
                <div class="sub">Tu menú favorito, directamente en Telegram.</div>
            </div>
        </div>

        <!-- SCENE 5: CTA -->
        <div class="scene scene-5" data-img="" data-duration="6000">
            <div class="text-box">
                <div class="title">ÚNETE</div>
                <div class="sub">Sé parte del ecosistema líder en Europa.</div>
                <div class="cta-btn">@VFPE_BOT</div>
            </div>
        </div>

        <!-- THE 3D DEVICE (Sincronizado por JS) -->
        <div class="device-container">
            <div class="phone" id="main-phone">
                <img src="" id="phone-img" alt="">
            </div>
        </div>
    </div>

    <script>
        const scenes = document.querySelectorAll('.scene');
        const phone = document.getElementById('main-phone');
        const phoneImg = document.getElementById('phone-img');
        const progressContainer = document.getElementById('progress-bar');
        let currentScene = 0;

        // Generar segmentos de progreso
        scenes.forEach(() => {
            const segment = document.createElement('div');
            segment.className = 'progress-segment';
            segment.innerHTML = '<div class="progress-fill"></div>';
            progressContainer.appendChild(segment);
        });

        const progressFills = document.querySelectorAll('.progress-fill');

        function updateScene() {
            const scene = scenes[currentScene];
            const imgPath = scene.getAttribute('data-img');
            const duration = parseInt(scene.getAttribute('data-duration'));
            
            // Limpiar estados previos
            scenes.forEach((s, i) => {
                s.classList.remove('active');
                s.classList.remove(`scene-${i+1}`); // Remove previous positioning class if needed
                progressFills[i].classList.remove('active-fill');
                if (i < currentScene) progressFills[i].style.width = '100%';
                else progressFills[i].style.width = '0%';
            });

            // Activar escena
            scene.classList.add('active');
            
            // Actualizar Imagen y Visibilidad del Teléfono
            if (imgPath) {
                phoneImg.src = imgPath;
                phone.style.opacity = "1";
            } else {
                phone.style.opacity = "0";
            }

            // Animación de progreso
            const fill = progressFills[currentScene];
            fill.classList.add('active-fill');
            fill.style.animationDuration = duration + 'ms';

            // Timer para siguiente escena
            setTimeout(() => {
                currentScene++;
                if (currentScene >= scenes.length) {
                    currentScene = 0;
                }
                updateScene();
            }, duration);
        }

        window.onload = updateScene;
    </script>
</body>
</html>
